                          { id: 'o1', client: '「一盒 900 元可以吃多久？如何吃效率最好？」', response: '「MAL 活粒鈣一盒內含 60 錠防潮 PTP 片裝。針對需要高效率補充的關鍵時期，我們建議每日 4 錠（早晚各 2 錠），一盒為足量 15 天份。人體腸道對鈣質的單次吸收上限約為 500mg，分次、分時補充 125mg 的純鈣，能讓腸道維持在最高吸收效率，避免單次高劑量帶來的浪費與腸胃負擔，是最高效、最精準的健康投資。」' },
                          { id: 'o2', client: '「市售碳酸鈣更便宜，差別在哪裡？」', response: '正式物理結構不同。「市售碳酸鈣遇到胃酸容易釋放大量二氧化碳氣體，導致肚子脹氣、便秘。我們融合海藻鈣、牛奶鈣等四大純淨高端鈣源，溫和不傷消化道。極高的服用依從性與高吸收率，才是最省心的選擇！」' },
                          { id: 'o3', client: '「孩子很挑食，怕買了又不吃」', response: '「活『粒』生活採用 100% CLEAN LABEL 潔淨製程，完美揉合天然乳源，調配出濃郁溫潤的牛奶風味。一咬即碎、隨後化開，像吃牛奶糖般的幸福感，孩子會天天主動搶著吃，不需媽媽操心！」' }
                        ].map(obj => (
                          <div key={obj.id} onClick={() => setFlippedObjection(flippedObjection === obj.id ? null : obj.id)} className="p-6 rounded-2xl border bg-white border-slate-200 hover:border-slate-300 cursor-pointer min-h-[160px] flex flex-col justify-between shadow-sm">
                            <div>
                              <span className="text-[10px] text-slate-400 font-bold block mb-1">提問拆招</span>
                              <h4 className="text-xs font-bold text-slate-800 mb-2 leading-snug">{obj.client}</h4>
                            </div>
                            {flippedObjection === obj.id ? (
                              <div className="text-[11px] pt-2 border-t border-teal-200 text-slate-700 leading-relaxed">
                                <strong>合規回覆：</strong>{obj.response}
                              </div>
                            ) : (
                              <span className="text-[11px] text-amber-600 font-bold flex items-center gap-1">👉 點擊查看內部對答法</span>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </section>

              {/* 【P5 圖片區】正式嵌入 MAL_Calc_banner_v2.png 國際認證無塵潔淨生產線形象 Banner */}
              <section id="factory-view" className="py-16 max-w-7xl mx-auto px-6 text-center">
                <div className="w-full bg-white rounded-3xl border border-slate-200 shadow-lg overflow-hidden relative group">
                  <div className="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center text-center p-4 z-0">
                    <i data-lucide="shield-check" className="w-10 h-10 text-emerald-400 mx-auto mb-2"></i>
                    <p className="text-xs font-bold text-slate-400">【P5 國際認證潔淨生產線形象大圖】</p>
                    <p className="text-[10px] text-slate-400 mt-1">請確保 MAL_Calc_banner_v2.png 檔案與此網頁放在同一個資料夾</p>
                  </div>
                  <img 
                    src="MAL_Calc_banner_v2.png" 
                    alt="MAL 國際認證無塵生產線" 
                    className="w-full h-auto relative z-10 group-hover:scale-[1.003] transition-transform duration-500"
                    loading="lazy"
                    onError={(e) => { e.target.style.display = 'none'; }}
                  />
                </div>
                <span className="text-[10px] text-slate-400 font-bold tracking-widest uppercase block mt-3"></span>
              </section>

              {/* 頁腳 */}
              <footer className="bg-white border-t border-slate-200/80 py-12">
                <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-8">
                  <div className="space-y-4">
                    <span className="text-lg font-black text-slate-900">MitoActiveLife</span>
                    <p className="text-xs text-slate-500 leading-relaxed font-bold">MitoActiveLife 活「粒」生活 專業與健康維持系列。融合多元優質複合鈣源 × 關鍵導航因子 × 100% 牛奶依從性。2026年修訂版。</p>
                  </div>
                  <div>
                    <h4 className="text-xs uppercase tracking-widest text-slate-400 font-extrabold mb-4">合法合規聲明與標準詞句</h4>
                    <p className="text-[10px] text-slate-500 leading-relaxed font-medium">
                      本網頁所有產品文案、教育訓練沙盒之編寫與規劃，均嚴格遵循衛生福利部食品藥物管理署公告之「食品廣告標示詞句認定基準」，僅作營養補充與健康維持之用途宣傳，不涉及任何醫療、疾病預防、突破基因與不實誇大之詞彙。
                    </p>
                  </div>
                  <div>
                    <span className="text-xs text-slate-400 font-bold block">© 2026 MitoActiveLife Inc. All Rights Reserved.</span>
                  </div>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
