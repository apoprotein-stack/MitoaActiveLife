                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-5 bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 space-y-6 shadow-inner">
                    <span className="text-xs text-slate-500 font-bold block uppercase">{t.solutions.physics_title}</span>
                    <div className="space-y-4">
                      <div className="p-3.5 bg-white rounded-xl border border-slate-150 shadow-sm">
                        <span className="text-xs font-bold text-slate-800 block">{t.solutions.p1_title}</span>
                        <span className="text-[11px] text-slate-500 block mt-1">{t.solutions.p1_desc}</span>
                      </div>
                      <div className="p-3.5 bg-white rounded-xl border border-slate-150 shadow-sm">
                        <span className="text-xs font-bold text-slate-800 block">{t.solutions.p2_title}</span>
                        <span className="text-[11px] text-slate-500 block mt-1">{t.solutions.p2_desc}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* 團隊介紹 (Our Leadership) */}
              <section id="team" className="py-20 max-w-7xl mx-auto px-6 border-b border-slate-100">
                <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-16">
                  <div className="space-y-4 max-w-2xl">
                    <span className="text-xs font-extrabold tracking-widest text-emerald-600 uppercase">{t.team.tag}</span>
                    <h2 className="text-3xl sm:text-4xl font-black text-slate-900">{t.team.title}</h2>
                  </div>
                </div>

                <div className="grid sm:grid-cols-2 gap-6 max-w-2xl">
                  {leaders.map(leader => (
                    <div key={leader.id} onClick={() => setSelectedLeader(leader)} className="bg-white rounded-2xl border border-slate-200 hover:border-emerald-200 overflow-hidden transition-all cursor-pointer flex flex-col justify-between shadow-sm">
                      <div className="p-5 space-y-2">
                        <h3 className="text-lg font-black text-slate-800">{leader.name}</h3>
                        <p className="text-xs text-slate-500 font-bold leading-tight">{leader.title}</p>
                        <p className="text-[11px] text-slate-500 line-clamp-2 mt-2 font-medium">{leader.experience}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              {/* 聯絡區/內部支援 (Contact Section) */}
              <section id="contact" className="py-20 max-w-7xl mx-auto px-6">
                <div className="grid lg:grid-cols-12 gap-12 bg-white p-8 sm:p-12 rounded-3xl border border-slate-200 shadow-lg">
                  <div className="lg:col-span-5 space-y-6">
                    <span className="text-xs font-extrabold tracking-widest text-emerald-600 uppercase">{t.contact.tag}</span>
                    <h2 className="text-3xl font-black text-slate-900">{t.contact.title}</h2>
                    <p className="text-slate-600 text-sm leading-relaxed">{t.contact.desc}</p>
                  </div>

                  <div className="lg:col-span-7 bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-inner">
                    <form className="space-y-4" onSubmit={(e) => e.preventDefault()}>
                      <div className="grid sm:grid-cols-2 gap-4">
                        <input type="text" placeholder={t.contact.input_name} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm" />
                        <input type="email" placeholder={t.contact.input_email} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm" />
                      </div>
                      <select className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-700">
                        <option>{t.contact.select_o1}</option>
                        <option>{t.contact.select_o2}</option>
                        <option>{t.contact.select_o3}</option>
                      </select>
                      <button type="submit" className="w-full py-4 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-400 text-white text-sm font-bold shadow-lg">{t.contact.btn}</button>
                    </form>
                  </div>
                </div>
              </section>

              {/* 頁腳 (Footer) */}
              <footer className="bg-white border-t border-slate-200/80 py-12">
                <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-8">
                  <div className="space-y-4">
                    <span className="text-lg font-black text-slate-900">MitoActiveLife</span>
                    <p className="text-xs text-slate-500 leading-relaxed font-bold">{t.footer.desc}</p>
                  </div>
                  <div>
                    <h4 className="text-xs uppercase tracking-widest text-slate-400 font-extrabold mb-4">{t.footer.legal_tag}</h4>
                    <p className="text-[10px] text-slate-500 leading-relaxed font-medium">
                      {t.footer.legal_desc}
                    </p>
                  </div>
                  <div>
                    <span className="text-xs text-slate-400 font-bold block">{t.footer.copy}</span>
                  </div>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
